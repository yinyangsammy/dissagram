{% extends "base.html" %}
{% block content %}
<div class="container py-5 text-center">
    <h1>🗑️ Delete Reaction?</h1>
    <form method="POST">
        {% csrf_token %}
        <button class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'home:home' %}" class="btn btn-secondary ms-2">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
